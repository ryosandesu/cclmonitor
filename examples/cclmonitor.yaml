eventlog:
  logdir: ~/.claude/logs        # log directory (default: ~/.claude/)
  retain_days: 30               # number of days to retain log files

rules:
  Bash:
    allow:
      - regex: '^(ls|pwd|cat|grep|echo|git\s+(?:status|log|diff|branch))\b'
    deny:
      - regex: '\brm\s+-rf\s+/'
      - regex: '\bcurl\b.*\|\s*(ba)?sh\b'

  Edit:
    allow:
      - glob: '<cwd>/**/*.{ts,go,py,md}'
    deny:
      - glob: '**/.env*'
      - glob: '**/*secret*'

  Write:
    deny:
      - glob: '**/.env*'
      - glob: '/etc/**'

  Read:
    allow:
      - glob: '<cwd>/**'
    deny:
      - glob: '**/.ssh/**'
      - glob: '**/.gnupg/**'
