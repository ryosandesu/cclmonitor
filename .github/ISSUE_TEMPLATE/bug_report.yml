name: Bug Report
description: Report a reproducible bug in cclmonitor
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include error output or log lines if available.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. macOS 14.5"
    validations:
      required: true

  - type: input
    id: go_version
    attributes:
      label: Go Version
      placeholder: "e.g. go1.22.3"
    validations:
      required: true

  - type: input
    id: cclmonitor_version
    attributes:
      label: cclmonitor Version
      placeholder: "e.g. v0.9.1"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Config
      description: Paste the relevant section of your `~/.claude/cclmonitor.yaml` (redact sensitive values).
      render: yaml
